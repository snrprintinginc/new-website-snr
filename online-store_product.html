<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0; url=products.html"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin"><title>Store Product | Redirect</title><link rel="stylesheet" href="assets/style.css">
<style id="yg-navbar-inline-fix">
header, .header, .site-header, .top-header, .main-header, .navbar {flex-wrap:nowrap !important;}
nav, .nav, .main-nav, .menu, .nav-links {white-space:nowrap !important;}
</style>


<style id="compact-store-grid-fix">
.products-grid,.product-grid,.store-grid,.shop-grid,.grid-products,.catalog-grid,.product-list{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;gap:18px!important}
@media (max-width:1024px){.products-grid,.product-grid,.store-grid,.shop-grid,.grid-products,.catalog-grid,.product-list{grid-template-columns:repeat(2,minmax(0,1fr))!important}}
@media (max-width:640px){.products-grid,.product-grid,.store-grid,.shop-grid,.grid-products,.catalog-grid,.product-list{grid-template-columns:1fr!important}}
</style>

</head><body><main class="alias-redirect"><article class="card"><h1>Store Product | Redirect</h1><p>This page now routes into the main store catalogue.</p><div class="btn-row"><a class="btn btn-primary" href="products.html">Continue to store</a></div></article></main>
<script>
(function(){
  function ensureCartSummaryCTA(){
    var addButtons = Array.from(document.querySelectorAll('button, a, input[type="button"], input[type="submit"]'))
      .filter(function(el){
        var txt = ((el.innerText || el.value || '') + '').toLowerCase().trim();
        return txt.includes('add to cart');
      });

    if (!addButtons.length) return;

    addButtons.forEach(function(btn){
      if (btn.dataset.summaryCtaBound === '1') return;
      btn.dataset.summaryCtaBound = '1';

      function showSummaryCTA(){
        var host = btn.closest('form, .product-configurator, .configurator, .product-detail, .product-page, .product-card, .container, main, section') || btn.parentElement;
        if (!host) return;

        var existing = host.querySelector('.post-cart-actions');
        if (!existing){
          var wrap = document.createElement('div');
          wrap.className = 'post-cart-actions';
          wrap.innerHTML = '<a href="cart-summary.html" class="view-cart-summary-btn">View Cart Summary</a>';
          btn.insertAdjacentElement('afterend', wrap);

          var note = document.createElement('div');
          note.className = 'cart-added-note';
          note.textContent = 'Item added. You can review your order before checkout.';
          wrap.insertAdjacentElement('afterend', note);
        }
      }

      btn.addEventListener('click', function(){
        window.setTimeout(showSummaryCTA, 150);
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureCartSummaryCTA);
  } else {
    ensureCartSummaryCTA();
  }
})();
</script>

</body></html>
